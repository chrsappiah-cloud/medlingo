name: CI - Release Gate

on:
  workflow_dispatch:
  push:
    tags: ['v*', 'release/*']

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gate:
    name: Full ARC Shield Regression
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Select Xcode
        run: bash scripts/select-xcode.sh

      - name: Prepare simulator
        run: |
          xcodebuild -downloadPlatform iOS || true
          RUNTIME_ID=$(xcrun simctl list runtimes available -j | python3 -c "
          import json, sys
          ios = [r for r in json.load(sys.stdin).get('runtimes', [])
                 if r.get('isAvailable') and 'iOS' in r.get('name', '')]
          ios.sort(key=lambda r: r['name'], reverse=True)
          print(ios[0]['identifier'] if ios else '')
          ")
          SIM_ID=$(xcrun simctl create "CI Release iPhone" "com.apple.CoreSimulator.SimDeviceType.iPhone-16" "$RUNTIME_ID")
          xcrun simctl boot "$SIM_ID"
          xcrun simctl bootstatus "$SIM_ID" -b
          echo "SIM_ID=$SIM_ID" >> $GITHUB_ENV

      - name: Run full test suite
        run: |
          xcodebuild test \
            -project "${{ github.workspace }}/medlingo.xcodeproj" \
            -scheme medlingo \
            -destination "platform=iOS Simulator,id=$SIM_ID" \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath ReleaseTestResults.xcresult

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-results
          path: ReleaseTestResults.xcresult
          if-no-files-found: ignore
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Submission checklist reminder
        run: |
          echo "## Release gate passed" >> $GITHUB_STEP_SUMMARY
          echo "Complete docs/AppStoreSubmissionChecklist.md before App Store upload." >> $GITHUB_STEP_SUMMARY
