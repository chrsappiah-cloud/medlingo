name: CI - Build & Test (ARC Shield)

# Lanes: PR = unit + smoke UI | Main = unit + integration + UI | Release = ci-release.yml

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Select Xcode
        run: bash scripts/select-xcode.sh

      - name: Build
        run: |
          xcodebuild build \
            -project "${{ github.workspace }}/medlingo.xcodeproj" \
            -scheme medlingo \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Prepare simulator
        env:
          CI_SIM_NAME: CI iPhone Medlingo
        run: bash scripts/ci-prepare-simulator.sh

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project "${{ github.workspace }}/medlingo.xcodeproj" \
            -scheme medlingo \
            -destination "platform=iOS Simulator,id=$SIM_ID" \
            -only-testing:medlingoTests \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          if-no-files-found: ignore
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

  integration-tests:
    name: Integration Tests
    runs-on: macos-15
    timeout-minutes: 30
    needs: build-and-test
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Select Xcode
        run: bash scripts/select-xcode.sh

      - name: Prepare simulator
        env:
          CI_SIM_NAME: CI Integration
        run: bash scripts/ci-prepare-simulator.sh

      - name: Run Integration Tests
        run: |
          xcodebuild test \
            -project "${{ github.workspace }}/medlingo.xcodeproj" \
            -scheme medlingo \
            -destination "platform=iOS Simulator,id=$SIM_ID" \
            -only-testing:medlingoIntegrationTests \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO

  ui-tests:
    name: UI Tests
    runs-on: macos-15
    timeout-minutes: 60
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Select Xcode
        run: bash scripts/select-xcode.sh

      - name: Prepare simulator
        env:
          CI_SIM_NAME: CI iPhone Medlingo UI
        run: bash scripts/ci-prepare-simulator.sh

      - name: Run UI Tests
        run: |
          TEST_FILTER="-only-testing:medlingoUITests"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TEST_FILTER="-only-testing:medlingoUITests/SmokeTests"
          fi
          for attempt in 1 2 3; do
            echo "UI test attempt $attempt..."
            rm -rf UITestResults.xcresult
            if xcodebuild test \
              -project "${{ github.workspace }}/medlingo.xcodeproj" \
              -scheme medlingo \
              -destination "platform=iOS Simulator,id=$SIM_ID" \
              $TEST_FILTER \
              -parallel-testing-enabled NO \
              -maximum-concurrent-test-simulator-destinations 1 \
              CODE_SIGNING_ALLOWED=NO \
              -resultBundlePath UITestResults.xcresult; then
              exit 0
            fi
            echo "::warning::UI tests failed on attempt $attempt"
            xcrun simctl shutdown "$SIM_ID" 2>/dev/null || true
            sleep 10
            xcrun simctl boot "$SIM_ID" 2>/dev/null || true
            xcrun simctl bootstatus "$SIM_ID" -b
            sleep 5
          done
          exit 1

      - name: Upload UI Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: UITestResults.xcresult
          if-no-files-found: ignore
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

  code-quality:
    name: Code Quality
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Select Xcode
        run: bash scripts/select-xcode.sh

      - name: Build and check warnings
        run: |
          xcodebuild build \
            -project "${{ github.workspace }}/medlingo.xcodeproj" \
            -scheme medlingo \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log
          ERRORS=$(grep -c "error:" build.log || true)
          WARNINGS=$(grep -c "warning:" build.log || true)
          echo "### Build Report" >> $GITHUB_STEP_SUMMARY
          echo "- Errors: $ERRORS" >> $GITHUB_STEP_SUMMARY
          echo "- Warnings: $WARNINGS" >> $GITHUB_STEP_SUMMARY
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Build has $ERRORS errors"
            exit 1
          fi

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [build-and-test, ui-tests, code-quality, integration-tests]
    if: always()
    steps:
      - name: Check CI results
        env:
          IS_MAIN: ${{ github.ref == 'refs/heads/main' || github.base_ref == 'main' }}
        run: |
          FAILED=0
          if [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "::error::Build & Unit Tests failed"
            FAILED=1
          fi
          if [ "${{ needs.code-quality.result }}" != "success" ]; then
            echo "::error::Code Quality check failed"
            FAILED=1
          fi
          if [ "$IS_MAIN" = "true" ]; then
            if [ "${{ needs.integration-tests.result }}" != "success" ]; then
              echo "::error::Integration Tests failed or skipped on main"
              FAILED=1
            fi
            if [ "${{ needs.ui-tests.result }}" != "success" ]; then
              echo "::error::UI Tests failed on main — blocks merge and TestFlight"
              FAILED=1
            fi
          else
            if [ "${{ needs.ui-tests.result }}" == "failure" ]; then
              echo "::warning::UI Tests failed on feature branch — fix before merging to main"
            fi
          fi
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "CI Gate passed — ready for merge and TestFlight distribution"
