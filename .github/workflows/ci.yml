name: CI - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve dependencies
        run: xcodebuild -resolvePackageDependencies -project medlingo.xcodeproj -scheme medlingo

      - name: Build
        run: |
          xcodebuild build \
            -project medlingo.xcodeproj \
            -scheme medlingo \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project medlingo.xcodeproj \
            -scheme medlingo \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -only-testing:medlingoTests \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult

  ui-tests:
    name: UI Tests
    runs-on: macos-15
    timeout-minutes: 45
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Run UI Tests
        run: |
          xcodebuild test \
            -project medlingo.xcodeproj \
            -scheme medlingo \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -only-testing:medlingoUITests \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath UITestResults.xcresult

      - name: Upload UI Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: UITestResults.xcresult

  code-quality:
    name: Code Quality
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for build warnings
        run: |
          xcodebuild build \
            -project medlingo.xcodeproj \
            -scheme medlingo \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log
          WARNINGS=$(grep -c "warning:" build.log || true)
          echo "Build warnings: $WARNINGS"
          if [ "$WARNINGS" -gt 10 ]; then
            echo "::warning::Build has $WARNINGS warnings"
          fi
