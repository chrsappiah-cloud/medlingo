name: CI - Build & Test

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild build \
            -project medlingo.xcodeproj \
            -scheme medlingo \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Unit Tests
        run: |
          xcodebuild -downloadPlatform iOS
          SIM_ID=$(xcrun simctl list devices available | grep "iPhone" | grep -v "unavailable" | head -1 | grep -oE '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}')
          if [ -z "$SIM_ID" ]; then
            SIM_ID=$(xcrun simctl create "TestPhone" "com.apple.CoreSimulator.SimDeviceType.iPhone-16" 2>/dev/null || echo "")
          fi
          if [ -n "$SIM_ID" ]; then
            xcodebuild test \
              -project medlingo.xcodeproj \
              -scheme medlingo \
              -destination "platform=iOS Simulator,id=$SIM_ID" \
              -only-testing:medlingoTests \
              CODE_SIGNING_ALLOWED=NO \
              -resultBundlePath TestResults.xcresult
          else
            echo "::warning::No iOS simulator available — skipping unit tests"
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          if-no-files-found: ignore

  code-quality:
    name: Code Quality
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Build and check warnings
        run: |
          xcodebuild build \
            -project medlingo.xcodeproj \
            -scheme medlingo \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log
          ERRORS=$(grep -c "error:" build.log || true)
          WARNINGS=$(grep -c "warning:" build.log || true)
          echo "### Build Report" >> $GITHUB_STEP_SUMMARY
          echo "- Errors: $ERRORS" >> $GITHUB_STEP_SUMMARY
          echo "- Warnings: $WARNINGS" >> $GITHUB_STEP_SUMMARY
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Build has $ERRORS errors"
            exit 1
          fi

  # Gate: all checks must pass before merge
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality]
    if: always()
    steps:
      - name: Check CI results
        run: |
          if [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "::error::Build & Test failed"
            exit 1
          fi
          if [ "${{ needs.code-quality.result }}" != "success" ]; then
            echo "::error::Code Quality check failed"
            exit 1
          fi
          echo "All CI checks passed"
