name: CI - Build & Test

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: bash scripts/select-xcode.sh

      - name: Install platform dependencies
        run: xcodebuild -downloadPlatform iOS

      - name: Build
        run: |
          xcodebuild build \
            -project "${{ github.workspace }}/medlingo.xcodeproj" \
            -scheme medlingo \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Prepare simulator
        run: |
          xcodebuild -downloadPlatform iOS
          RUNTIME_ID=""
          for attempt in 1 2 3 4 5; do
            RUNTIME_ID=$(xcrun simctl list runtimes available -j | python3 -c "
          import json, sys
          ios = [r for r in json.load(sys.stdin).get('runtimes', [])
                 if r.get('isAvailable') and 'iOS' in r.get('name', '')]
          if ios:
              ios.sort(key=lambda r: r['name'], reverse=True)
              print(ios[0]['identifier'])
          ")
            if [ -n "$RUNTIME_ID" ]; then break; fi
            echo "Waiting for iOS runtime (attempt $attempt)..."
            sleep 15
          done
          if [ -z "$RUNTIME_ID" ]; then
            echo "::error::No iOS simulator runtime available after retries"
            xcrun simctl list runtimes
            exit 1
          fi
          SIM_ID=$(xcrun simctl create "CI iPhone Medlingo" "com.apple.CoreSimulator.SimDeviceType.iPhone-16" "$RUNTIME_ID")
          xcrun simctl boot "$SIM_ID"
          xcrun simctl bootstatus "$SIM_ID" -b
          echo "SIM_ID=$SIM_ID" >> $GITHUB_ENV

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project "${{ github.workspace }}/medlingo.xcodeproj" \
            -scheme medlingo \
            -destination "platform=iOS Simulator,id=$SIM_ID" \
            -only-testing:medlingoTests \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          if-no-files-found: ignore

  ui-tests:
    name: UI Tests
    runs-on: macos-15
    timeout-minutes: 60
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: bash scripts/select-xcode.sh

      - name: Install platform dependencies
        run: xcodebuild -downloadPlatform iOS

      - name: Prepare simulator
        run: |
          xcodebuild -downloadPlatform iOS
          RUNTIME_ID=""
          for attempt in 1 2 3 4 5; do
            RUNTIME_ID=$(xcrun simctl list runtimes available -j | python3 -c "
          import json, sys
          ios = [r for r in json.load(sys.stdin).get('runtimes', [])
                 if r.get('isAvailable') and 'iOS' in r.get('name', '')]
          if ios:
              ios.sort(key=lambda r: r['name'], reverse=True)
              print(ios[0]['identifier'])
          ")
            if [ -n "$RUNTIME_ID" ]; then break; fi
            echo "Waiting for iOS runtime (attempt $attempt)..."
            sleep 15
          done
          if [ -z "$RUNTIME_ID" ]; then
            echo "::error::No iOS simulator runtime available after retries"
            xcrun simctl list runtimes
            exit 1
          fi
          SIM_ID=$(xcrun simctl create "CI iPhone Medlingo UI" "com.apple.CoreSimulator.SimDeviceType.iPhone-16" "$RUNTIME_ID")
          xcrun simctl boot "$SIM_ID"
          xcrun simctl bootstatus "$SIM_ID" -b
          echo "SIM_ID=$SIM_ID" >> $GITHUB_ENV

      - name: Run UI Tests
        run: |
          xcodebuild test \
            -project "${{ github.workspace }}/medlingo.xcodeproj" \
            -scheme medlingo \
            -destination "platform=iOS Simulator,id=$SIM_ID" \
            -only-testing:medlingoUITests \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath UITestResults.xcresult

      - name: Upload UI Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: UITestResults.xcresult
          if-no-files-found: ignore

  code-quality:
    name: Code Quality
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: bash scripts/select-xcode.sh

      - name: Install platform dependencies
        run: xcodebuild -downloadPlatform iOS

      - name: Build and check warnings
        run: |
          xcodebuild build \
            -project "${{ github.workspace }}/medlingo.xcodeproj" \
            -scheme medlingo \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log
          ERRORS=$(grep -c "error:" build.log || true)
          WARNINGS=$(grep -c "warning:" build.log || true)
          echo "### Build Report" >> $GITHUB_STEP_SUMMARY
          echo "- Errors: $ERRORS" >> $GITHUB_STEP_SUMMARY
          echo "- Warnings: $WARNINGS" >> $GITHUB_STEP_SUMMARY
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Build has $ERRORS errors"
            exit 1
          fi

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [build-and-test, ui-tests, code-quality]
    if: always()
    steps:
      - name: Check CI results
        run: |
          FAILED=0
          if [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "::error::Build & Unit Tests failed"
            FAILED=1
          fi
          if [ "${{ needs.code-quality.result }}" != "success" ]; then
            echo "::error::Code Quality check failed"
            FAILED=1
          fi
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          if [ "${{ needs.ui-tests.result }}" == "failure" ]; then
            echo "::warning::UI Tests failed — merge allowed; fix before App Store submission"
          elif [ "${{ needs.ui-tests.result }}" == "success" ]; then
            echo "UI Tests passed"
          else
            echo "::warning::UI Tests did not complete (${{ needs.ui-tests.result }})"
          fi
          echo "CI Gate passed — ready for merge and TestFlight distribution"
