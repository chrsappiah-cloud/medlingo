name: CI - Build & Test

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Project targets iOS 26.4 — requires Xcode 26.x for simulator runtimes
          if [ -d /Applications/Xcode_26.3.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          elif [ -d /Applications/Xcode_26.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Build
        run: |
          xcodebuild build \
            -project medlingo.xcodeproj \
            -scheme medlingo \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Prepare simulator
        run: |
          xcodebuild -downloadPlatform iOS
          SIM_ID=$(xcrun simctl list devices available | grep -E "iPhone 16|iPhone 17|CI iPhone" | grep -oE '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' | head -1)
          if [ -z "$SIM_ID" ]; then
            RUNTIME=$(xcrun simctl list runtimes available -j | python3 -c "import json,sys; d=json.load(sys.stdin); print(next((r['identifier'] for r in d['runtimes'] if r['isAvailable'] and 'iOS' in r['name']), ''))")
            SIM_ID=$(xcrun simctl create "CI iPhone" "com.apple.CoreSimulator.SimDeviceType.iPhone-16" "$RUNTIME" 2>/dev/null || true)
          fi
          if [ -z "$SIM_ID" ]; then
            echo "::error::No iOS simulator available for unit tests"
            exit 1
          fi
          echo "SIM_ID=$SIM_ID" >> $GITHUB_ENV
          xcrun simctl boot "$SIM_ID" 2>/dev/null || true

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project medlingo.xcodeproj \
            -scheme medlingo \
            -destination "platform=iOS Simulator,id=$SIM_ID" \
            -only-testing:medlingoTests \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          if-no-files-found: ignore

  ui-tests:
    name: UI Tests
    runs-on: macos-15
    timeout-minutes: 60
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Project targets iOS 26.4 — requires Xcode 26.x for simulator runtimes
          if [ -d /Applications/Xcode_26.3.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          elif [ -d /Applications/Xcode_26.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Prepare simulator
        run: |
          xcodebuild -downloadPlatform iOS
          SIM_ID=$(xcrun simctl list devices available | grep -E "iPhone 16|iPhone 17|CI iPhone" | grep -oE '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' | head -1)
          if [ -z "$SIM_ID" ]; then
            RUNTIME=$(xcrun simctl list runtimes available -j | python3 -c "import json,sys; d=json.load(sys.stdin); print(next((r['identifier'] for r in d['runtimes'] if r['isAvailable'] and 'iOS' in r['name']), ''))")
            SIM_ID=$(xcrun simctl create "CI iPhone" "com.apple.CoreSimulator.SimDeviceType.iPhone-16" "$RUNTIME")
          fi
          echo "SIM_ID=$SIM_ID" >> $GITHUB_ENV
          xcrun simctl boot "$SIM_ID" 2>/dev/null || true

      - name: Run UI Tests
        run: |
          xcodebuild test \
            -project medlingo.xcodeproj \
            -scheme medlingo \
            -destination "platform=iOS Simulator,id=$SIM_ID" \
            -only-testing:medlingoUITests \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath UITestResults.xcresult

      - name: Upload UI Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: UITestResults.xcresult
          if-no-files-found: ignore

  code-quality:
    name: Code Quality
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_26.3.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          elif [ -d /Applications/Xcode_26.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Build and check warnings
        run: |
          xcodebuild build \
            -project medlingo.xcodeproj \
            -scheme medlingo \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log
          ERRORS=$(grep -c "error:" build.log || true)
          WARNINGS=$(grep -c "warning:" build.log || true)
          echo "### Build Report" >> $GITHUB_STEP_SUMMARY
          echo "- Errors: $ERRORS" >> $GITHUB_STEP_SUMMARY
          echo "- Warnings: $WARNINGS" >> $GITHUB_STEP_SUMMARY
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Build has $ERRORS errors"
            exit 1
          fi

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [build-and-test, ui-tests, code-quality]
    if: always()
    steps:
      - name: Check CI results
        run: |
          if [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "::error::Build & Unit Tests failed"
            exit 1
          fi
          if [ "${{ needs.ui-tests.result }}" != "success" ]; then
            echo "::error::UI Tests failed"
            exit 1
          fi
          if [ "${{ needs.code-quality.result }}" != "success" ]; then
            echo "::error::Code Quality check failed"
            exit 1
          fi
          echo "All CI checks passed — ready for merge and distribution"
